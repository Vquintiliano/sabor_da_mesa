version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sabor_mesa_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sabor_mesa_db
      MYSQL_USER: mesa_user
      MYSQL_PASSWORD: mesa_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sabor-network

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: sabor_mesa_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 64M
    ports:
      - "8080:80"
    networks:
      - sabor-network

  backend:
    build:
      context: ./backend
    container_name: sabor_mesa_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: sabor_mesa_db
      DB_USER: mesa_user
      DB_PASSWORD: mesa_pass
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - sabor-network

  frontend:
    build:
      context: ./frontend-next
    container_name: sabor_mesa_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    ports:
      - "3001:3000"
    volumes:
      - ./frontend-next:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    networks:
      - sabor-network

volumes:
  mysql_data:

networks:
  sabor-network:
    driver: bridge